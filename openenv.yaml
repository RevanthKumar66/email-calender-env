name: email-calendar-env
version: "1.0.0"
description: "Email + Calendar RL Environment"
author: your-hf-username
tags:
  - openenv
  - email
  - calendar
  - scheduling
  - productivity
  - real-world
tasks:
  - id: "easy"
    name: "Simple Inbox Triage"
    description: "Process urgent emails"
    grader: "env.grader:grade_easy"
  - id: "medium"
    name: "Inbox + Meeting Scheduling"
    description: "Handle replies and scheduling"
    grader: "env.grader:grade_medium"
  - id: "hard"
    name: "Full Workday Simulation"
    description: "Full email and calendar workflow"
    grader: "env.grader:grade_hard"
observation_space:
  type: dict
  fields:
    - inbox_emails
    - calendar_events
    - current_step
    - task_objective
action_space:
  type: discrete_parametric
  actions:
    - archive_email
    - flag_email
    - reply_email
    - delegate_email
    - schedule_meeting
    - decline_meeting
reward_range: [-1.0, 1.0]
