name: email-calendar-env
version: "1.0.0"
description: "Email + Calendar RL Environment"
author: your-hf-username
tags:
  - openenv
  - email
  - calendar
tasks:
  - id: easy
    description: "Process urgent emails"
  - id: medium
    description: "Handle replies and scheduling"
  - id: hard
    description: "Full email and calendar workflow"
observation_space:
  type: dict
  fields:
    - inbox_emails
    - calendar_events
    - current_step
    - task_objective
action_space:
  type: discrete_parametric
  actions:
    - archive_email
    - flag_email
    - reply_email
    - delegate_email
    - schedule_meeting
    - decline_meeting
reward_range: [-1.0, 1.0]
