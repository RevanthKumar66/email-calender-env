name: email-calendar-env
version: "1.0.0"
description: "Email + Calendar Assistant"
tasks:
  - id: easy
    name: "Simple Inbox Triage"
    difficulty: "Easy"
    description: "Triage urgent emails into correct folders."
    grader: "env.grader:grade_easy"
  - id: medium
    name: "Inbox + Meeting Scheduling"
    difficulty: "Medium"
    description: "Manage replies and schedule meetings."
    grader: "env.grader:grade_medium"
  - id: hard
    name: "Full Workday Simulation"
    difficulty: "Hard"
    description: "Handle high-volume email and calendar conflicts."
    grader: "env.grader:grade_hard"
observation_space:
  type: dict
  fields:
    - inbox_emails
    - calendar_events
    - current_step
    - task_id
    - task_objective
    - score_so_far
action_space:
  type: discrete_parametric
  actions:
    - archive_email
    - flag_email
    - reply_email
    - delegate_email
    - schedule_meeting
    - decline_meeting
    - no_op
reward_range: [-1.0, 1.0]
