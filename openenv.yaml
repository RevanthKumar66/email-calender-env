name: email-calendar-env
version: "1.0.0"
description: "Email + Calendar Assistant"
tasks:
  - id: easy
    description: "Triage urgent emails"
    grader: "env.grader:grade_easy"
  - id: medium
    description: "Handle replies and meetings"
    grader: "env.grader:grade_medium"
  - id: hard
    description: "Full workday management"
    grader: "env.grader:grade_hard"
observation_space:
  type: dict
  # Standardized names
  fields:
    - inbox_emails
    - calendar_events
    - current_step
    - task_objective
action_space:
  type: discrete_parametric
  actions:
    - archive_email
    - flag_email
    - reply_email
    - delegate_email
    - schedule_meeting
    - decline_meeting
    - no_op
reward_range: [-1.0, 1.0]
